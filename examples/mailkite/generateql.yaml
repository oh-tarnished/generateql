# generateql config — run `generateql generate` from this directory (no flags needed).
# Paths are relative to the working directory.

# Auto-introspect a live endpoint:
endpoint: http://localhost:3280/graphql
#   admin-secret: ""            # or use headers below
#   schema: path/to/schema.json # ...or generate offline from a cached introspection JSON

lang: go
go-module: github.com/oh-tarnished/generateql/examples/mailkite/mailkiteql
out: .            # the library is written to ./mailkiteql/
max-depth: 1

# dump-schema: true   # also write the introspection schema to mailkiteql/schema.json

# headers:
#   - "Authorization: Bearer <token>"
# scalars:
#   - "MyScalar=string"
