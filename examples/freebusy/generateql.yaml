# generateql config — run `generateql generate` from this directory (no flags needed).
# Paths are relative to the working directory.

# Auto-introspect a live endpoint (the default workflow):
endpoint: http://localhost:3280/graphql
#   admin-secret: ""            # or use headers below

# ...or generate offline from the cached introspection JSON (skips the network).
# Uncomment to use it; when set, `schema` wins over `endpoint`.
#   schema: schema.json

lang: go
go-module: github.com/oh-tarnished/generateql/examples/freebusy/freebusyql
out: .            # the library is written to ./freebusyql/
max-depth: 1

# dump-schema: true   # also write the introspection schema to freebusyql/schema.json

# headers:
#   - "Authorization: Bearer <token>"
# scalars:
#   - "MyScalar=string"
